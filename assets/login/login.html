<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
    rel="shortcut icon"
    href="../inicio/iconoClinica.PNG"
    type="image/x-icon"
  />
    <title>Inicio Sesión</title>
    <link rel="stylesheet" href="login.css" />
  </head>
  <body>
    <header>
      <nav class="navegacion">
        <ul class="menu">
          <li>
            <button>
              <span
                ><a href="../../index.html"
                  ><img
                    src="../inicio/logoClinica.png"
                    alt="logo"
                    href="../../index.html"
                  />
                </a>
              </span>
            </button>
          </li>
          <li><a href="../servicios/servicios.html">Servicios</a></li>
          <li><a href="../nosotros/nosotros.html">Nosotros</a></li>
          <li><a href="../blog/blog.html">Blog/Noticias</a></li>
          <li><a href="../contacto/contacto.html">Contacto</a></li>
          <li><a href="login.html">Login</a></li>
        </ul>
      </nav>
    </header>
    <main>
      <div class="login-box">
        <h2>Inicio de sesion</h2>
        <div class="social-icons">
          <img
            src="https://img.icons8.com/ios-filled/30/ffffff/facebook--v1.png"
            alt="Facebook"
          />
          <img
            src="https://img.icons8.com/ios-filled/30/ffffff/mac-os.png"
            alt="Apple"
          />
          <img
            src="https://img.icons8.com/ios-filled/30/ffffff/google-logo.png"
            alt="Google"
          />
        </div>
        <form class="formulario">
          <input type="text" placeholder="DNI" name="dni" required />
          <input
            type="password"
            placeholder="Contraseña"
            name="password"
            required
          />
          <button class="btn-continuar" type="submit">Continuar</button>
        </form>
        <a href="#">Recuperar contraseña</a>
        <button class="btn-crear">Crea una cuenta</button>
      </div>
    </main>
    <footer>
      <p class="copy">Todos los derechos reservados</p>
      <p class="copy">2025. Clinica Tu Salud &copy;</p>
    </footer>
  </body>
